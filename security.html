<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: #f8fafc;
      color: #0f172a;
      overflow-x: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid #e2e8f0;
    }

    .nav {
      max-width: 1180px;
      height: 68px;
      margin: auto;
      padding: 0 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand,
    .back-link {
      text-decoration: none;
      color: #0f172a;
      font-weight: 800;
    }

    .brand {
      font-size: 21px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #0f766e;
      background: #ecfdf5;
      border: 1px solid #ccfbf1;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
    }

    .page {
      max-width: 1180px;
      margin: auto;
      padding: 46px 22px 70px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 22px;
      align-items: stretch;
      margin-bottom: 22px;
    }

    .hero-copy {
      border-radius: 30px;
      padding: 34px;
      background: #fff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 22px 52px rgba(15,23,42,0.06);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #0f766e;
      background: #ecfdf5;
      border-radius: 999px;
      padding: 8px 13px;
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 42px;
      line-height: 1.25;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .lead {
      color: #475569;
      font-size: 17px;
      line-height: 1.9;
      margin-bottom: 24px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      text-decoration: none;
      border-radius: 999px;
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 800;
    }

    .btn-primary {
      color: #fff;
      background: #0f766e;
      box-shadow: 0 16px 32px rgba(15,118,110,0.2);
    }

    .btn-light {
      color: #0f172a;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }

    .security-visual {
      position: relative;
      min-height: 430px;
      border-radius: 30px;
      color: #fff;
      padding: 28px;
      overflow: hidden;
      background:
        radial-gradient(circle at 22% 18%, rgba(45,212,191,0.38), transparent 26%),
        radial-gradient(circle at 80% 76%, rgba(37,99,235,0.28), transparent 32%),
        linear-gradient(135deg, #0f172a, #111827 62%, #042f2e);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .security-visual::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.45;
    }

    .visual-icon,
    .visual-stack {
      position: relative;
      z-index: 1;
    }

    .visual-icon {
      width: 104px;
      height: 104px;
      border-radius: 30px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.16);
      color: #5eead4;
      font-size: 48px;
    }

    .visual-stack {
      display: grid;
      gap: 10px;
    }

    .visual-stack div {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-radius: 18px;
      padding: 13px 15px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: #dbeafe;
      font-size: 14px;
      font-weight: 800;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 0.72fr;
      gap: 22px;
      align-items: start;
    }

    .panel {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 26px;
      padding: 28px;
    }

    .panel h2 {
      font-size: 25px;
      line-height: 1.35;
      margin-bottom: 16px;
    }

    .included {
      display: grid;
      gap: 12px;
    }

    .included li {
      list-style: none;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: #334155;
      font-size: 15px;
      line-height: 1.8;
    }

    .included i {
      color: #16a34a;
      margin-top: 6px;
      flex-shrink: 0;
    }

    .side {
      display: grid;
      gap: 16px;
    }

    .mini-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 22px;
    }

    .mini-card h3 {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .mini-card p,
    .mini-card li {
      color: #475569;
      font-size: 14px;
      line-height: 1.75;
    }

    .mini-card ul {
      display: grid;
      gap: 8px;
      padding: 0;
    }

    .mini-card li {
      list-style: none;
      display: flex;
      gap: 8px;
    }

    .mini-card li::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #0f766e;
      margin-top: 10px;
      flex-shrink: 0;
    }

    .service-list {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .service-chip {
      text-decoration: none;
      color: #0f172a;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 12px;
      font-size: 13px;
      font-weight: 800;
      text-align: center;
      transition: 0.2s ease;
    }

    .service-chip:hover,
    .service-chip.active {
      color: #0f766e;
      border-color: #99f6e4;
      background: #ecfdf5;
    }

    @media (max-width: 900px) {
      .hero,
      .content-grid {
        grid-template-columns: 1fr;
      }

      .service-list {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 620px) {
      .nav {
        height: auto;
        padding: 14px 18px;
        flex-direction: column;
        align-items: stretch;
      }

      .brand,
      .back-link {
        justify-content: center;
        text-align: center;
      }

      .page {
        padding: 28px 16px 50px;
      }

      .hero-copy,
      .security-visual,
      .panel,
      .mini-card {
        border-radius: 20px;
        padding: 22px;
      }

      h1 {
        font-size: 30px;
      }

      .lead {
        font-size: 15px;
      }

      .security-visual {
        min-height: 340px;
      }

      .service-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
