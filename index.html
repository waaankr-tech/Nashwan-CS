<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nashwan CS</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Cairo',sans-serif;
  background:#fff;
  overflow-x:hidden;
}

/* HERO */
.hero{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  padding:25px;
  gap:30px;
}

.hero-text{
  flex:1;
  min-width:280px;
}

.badge{
  display:inline-block;
  background:#eef4ff;
  color:#2563eb;
  padding:8px 14px;
  border-radius:20px;
  margin-bottom:15px;
}

.hero-text h1{
  font-size:42px;
  margin-bottom:15px;
}

.hero-text p{
  color:#666;
  line-height:1.8;
}

.hero-image{
  flex:1;
  display:flex;
  justify-content:center;
  position:relative;
}

.hero-image img{
  width:100%;
  max-width:380px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.floating{
  position:absolute;
  background:#fff;
  padding:10px 14px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  font-size:13px;
  animation:float 4s infinite ease-in-out;
}

.card1{top:10%;left:0;}
.card2{top:20%;right:0;}
.card3{bottom:20%;left:10%;}
.card4{bottom:5%;right:10%;}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* SERVICES */
.services{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

.service-card{
  background:#fff;
  padding:20px;
  border-radius:18px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* SLIDER */
.slider-wrapper{
  position:relative;
  padding:20px;
}

.software-slider{
  display:flex;
  overflow-x:auto;
  gap:15px;
  scroll-behavior:smooth;
  padding:10px;
}

.soft-card{
  min-width:150px;
  background:#fff;
  padding:15px;
  border-radius:18px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  text-align:center;
}

.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#fff;
  border:none;
  width:40px;
  height:40px;
  border-radius:50%;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.left{left:5px;}
.right{right:5px;}

/* SOCIAL */
.social-fixed{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  background:#fff;
  padding:10px;
  border-radius:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.social-fixed a{
  width:40px;
  height:40px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:12px;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:15px;
  margin-top:20px;
  border-top:1px solid #eee;
}

/* MOBILE */
@media(max-width:768px){
  .hero{
    flex-direction:column;
    text-align:center;
  }

  .hero-text h1{
    font-size:30px;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

  <div class="hero-text">
    <span class="badge">Nashwan CS</span>
    <h1>حلول تقنية ذكية ودعم احترافي</h1>
    <p>نقدم خدمات صيانة الحاسبات والكاميرات الشبكية والدعم عن بعد.</p>
  </div>

  <div class="hero-image">

    <!-- ✅ الصورة المصححة -->
    <img src="https://i.ibb.co/99y6dkPg/Whats-App-Image-2026-05-23-at-1-24-10-PM.jpg" alt="hero">

    <div class="floating card1">دعم فني</div>
    <div class="floating card2">Office</div>
    <div class="floating card3">Photoshop</div>
    <div class="floating card4">كاميرات IP</div>

  </div>

</section>

<!-- SERVICES -->
<section class="services">
  <div class="service-card">الدعم التقني</div>
  <div class="service-card">كاميرات IP</div>
  <div class="service-card">الحماية</div>
  <div class="service-card">الشبكات</div>
</section>

<!-- SLIDER -->
<div class="slider-wrapper">

<button class="nav-btn left" onclick="moveSlider(-1)">‹</button>

<div class="software-slider" id="softwareSlider">
  <div class="soft-card">Windows</div>
  <div class="soft-card">Office</div>
  <div class="soft-card">Photoshop</div>
  <div class="soft-card">Premiere</div>
</div>

<button class="nav-btn right" onclick="moveSlider(1)">›</button>

</div>

<!-- SOCIAL -->
<div class="social-fixed">

<a href="#" style="background:#e1306c;color:#fff;"><i class="fa-brands fa-instagram"></i></a>
<a href="#" style="background:#000;color:#fff;"><i class="fa-brands fa-tiktok"></i></a>
<a href="#" style="background:#1877f2;color:#fff;"><i class="fa-brands fa-facebook-f"></i></a>
<a href="https://wa.me/9647734449499" style="background:#25d366;color:#fff;"><i class="fa-brands fa-whatsapp"></i></a>

</div>

<!-- FOOTER -->
<footer class="footer">
<p>© 2026 Nashwan CS</p>
</footer>

<script>
function moveSlider(dir){
  document.getElementById("softwareSlider").scrollLeft += dir * 200;
}
</script>

</body>
</html>
